<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              lumen: {
                accent: '#10b981', // Emerald green for new brand
                dark: '#111111',
                panel: '#1C1C1C',
                border: '#2A2A2A'
              }
            }
          }
        }
      }
    </script>
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "marked": "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
    <style>
      body {
        background-color: #0f0f0f;
        color: #ffffff;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1C1C1C; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444; 
      }

      /* Dotted Background Pattern */
      .bg-dotted-pattern {
        background-color: #0F0F0F;
        background-image: radial-gradient(#333 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Markdown Content Styling */
      .prose table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 1rem;
        margin-bottom: 1rem;
      }
      .prose th, .prose td {
        border: 1px solid #333;
        padding: 0.5rem 1rem;
        text-align: left;
      }
      .prose th {
        background-color: #1A1A1A;
        color: #10b981;
      }
      .prose blockquote {
        border-left: 4px solid #10b981;
        padding-left: 1rem;
        color: #9ca3af;
        font-style: italic;
      }
      /* Enhanced Code Block Styling */
      .prose pre {
        background-color: #161616;
        padding: 1rem;
        border-radius: 0.5rem;
        border: 1px solid #333;
        overflow-x: auto;
        font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        font-size: 0.9em;
        line-height: 1.5;
        color: #e5e7eb;
        box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
      }
      .prose code {
        background-color: rgba(255,255,255,0.1);
        padding: 0.2em 0.4em;
        border-radius: 0.25rem;
        font-size: 0.9em;
      }
      .prose pre code {
        background-color: transparent;
        padding: 0;
      }

      /* PRINT STYLES (PDF Export) */
      @media print {
        @page {
          margin: 1.5cm;
        }
        body {
          background-color: white !important;
          color: black !important;
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }
        /* Hide UI elements */
        .print\:hidden {
          display: none !important;
        }
        /* Force Editor Visibility */
        #root { 
          display: block !important; 
          height: auto !important;
          overflow: visible !important;
        }
        /* Style Content for Paper */
        .prose { 
          max-width: 100% !important; 
          color: black !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .prose p, .prose li, .prose h1, .prose h2, .prose h3 {
          color: black !important;
        }
        /* Adjust borders for print */
        .prose th, .prose td, .prose pre, .prose blockquote {
          border-color: #ddd !important;
        }
        .prose th {
          background-color: #f3f4f6 !important;
          color: black !important;
        }
        /* Hide placeholders */
        [contenteditable]:empty::before {
          display: none !important;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
